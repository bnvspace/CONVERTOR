<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер Файлов</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/favicon.ico?v=2" type="image/x-icon">
</head>

<body>
    <div class="container">
        <h1>Конвертер</h1>
        <form id="convertForm" novalidate>
            <div class="upload-box" id="dropZone">
                <p>Перетащите файлы сюда или нажмите для выбора</p>
                <input type="file" id="fileInput" name="files" accept="image/gif,image/png,image/jpeg" multiple hidden>
                <div id="fileList" class="file-list"></div>
            </div>

            <div class="controls">
                <label for="format">В какой формат:</label>
                <select id="format" name="format">
                    <option value="png" selected>PNG</option>
                    <option value="jpg">JPG</option>
                    <option value="webp">WEBP</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Конвертировать</button>
        </form>
        <div id="status" class="status"></div>
        <div id="results" class="results"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
